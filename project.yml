        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/OakTabBarView/src
        group: Frameworks/OakTabBarView
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/OakTextView/src
        group: Frameworks/OakTextView
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/parse/src
        group: Frameworks/parse
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/plist/src
        group: Frameworks/plist
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/Preferences/src
        group: Frameworks/Preferences
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/regexp/src
        group: Frameworks/regexp
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/scm/src
        group: Frameworks/scm
