# project.yml — SW³ TextFellow
# XcodeGen specification for generating TextFellow.xcodeproj
# Run: xcodegen generate
#
# This file mirrors the Rave build system. Both must produce identical binaries.

name: TextFellow

options:
  bundleIdPrefix: org.sw3t
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Xcode/Debug.xcconfig
  Release: Xcode/Release.xcconfig

fileGroups:
  - Xcode
  - Shared

# ─────────────────────────────────────────────────
# Targets
# ─────────────────────────────────────────────────

targets:

  # ── Vendor: Onigmo (C regex library, git submodule) ──
  Onigmo:
    type: library.static
    platform: macOS
    sources:
      - path: vendor/Onigmo/vendor
        includes: ["*.c", "*.h"]
        excludes: ["test*.c", "mktable.c"]
        headerVisibility: project
      - path: vendor/Onigmo/vendor/enc
        includes: ["*.c"]
        headerVisibility: project
    settings:
      GCC_PRECOMPILE_PREFIX_HEADER: false
      GCC_PREFIX_HEADER: ""
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/vendor/Onigmo/vendor
        - $(SRCROOT)/vendor/Onigmo
      WARNING_CFLAGS: "-w"

  # ── Vendor: tree-sitter (incremental parsing library, git submodule) ──
  TreeSitter:
    type: library.static
    platform: macOS
    sources:
      - path: vendor/tree-sitter/lib/src
        includes: ["lib.c"]
        headerVisibility: project
    settings:
      GCC_PRECOMPILE_PREFIX_HEADER: false
      GCC_PREFIX_HEADER: ""
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/vendor/tree-sitter/lib/include
        - $(SRCROOT)/vendor/tree-sitter/lib/src
      WARNING_CFLAGS: "-w"

  # ── Vendor: kvdb (ObjC key-value store, git submodule) ──
  kvdb:
    type: library.static
    platform: macOS
    sources:
      - path: vendor/kvdb/vendor/kvdb
        includes: ["*.m", "*.h"]
        headerVisibility: project
    settings:
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/vendor/kvdb/vendor
      WARNING_CFLAGS: "-w"

  # ── TextFellowCore: all framework sources in one static library ──
  TextFellowCore:
    type: library.static
    platform: macOS
    sources:
      - path: Frameworks/authorization/src
        group: Frameworks/authorization
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/buffer/src
        group: Frameworks/buffer
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/BundleEditor/src
        group: Frameworks/BundleEditor
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/BundleMenu/src
        group: Frameworks/BundleMenu
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/bundles/src
        group: Frameworks/bundles
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/BundlesManager/src
        group: Frameworks/BundlesManager
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/cf/src
        group: Frameworks/cf
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/command/src
        group: Frameworks/command
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/CommitWindow/src
        group: Frameworks/CommitWindow
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/crash/src
        group: Frameworks/crash
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/CrashReporter/src
        group: Frameworks/CrashReporter
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/document/src
