        headerVisibility: project
      - path: Frameworks/editor/src
        group: Frameworks/editor
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/encoding/src
        group: Frameworks/encoding
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/file/src
        group: Frameworks/file
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/FileBrowser/src
        group: Frameworks/FileBrowser
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/Find/src
        group: Frameworks/Find
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/HTMLOutput/src
        group: Frameworks/HTMLOutput
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/HTMLOutputWindow/src
        group: Frameworks/HTMLOutputWindow
        excludes: ["t_*"]
