      - path: Frameworks/theme/src
        group: Frameworks/theme
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/TMFileReference/src
        group: Frameworks/TMFileReference
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/undo/src
        group: Frameworks/undo
        excludes: ["t_*"]
        headerVisibility: project
      - path: Frameworks/updater/src
        group: Frameworks/updater
        excludes: ["t_*"]
        headerVisibility: project
      - path: build/xcode/generated
        group: Generated
        includes: ["*.cc", "*.c++", "*.h"]
        optional: true
        headerVisibility: project
    dependencies:
      - target: Onigmo
      - target: kvdb
    preBuildScripts:
      - name: Generate Header Symlinks
        script: |
          "${SRCROOT}/Xcode/gen-header-symlinks.sh"
        basedOnDependencyAnalysis: false
    buildRules:
      - filePattern: "*.rl"
        script: |
          ragel -o "${DERIVED_FILE_DIR}/${INPUT_FILE_BASE}.cc" "${INPUT_FILE_PATH}"
        outputFiles:
          - $(DERIVED_FILE_DIR)/$(INPUT_FILE_BASE).cc
    settings:
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/vendor/Onigmo/vendor
        - $(SRCROOT)/vendor/Onigmo
        - $(SRCROOT)/vendor/kvdb/vendor
        - $(DERIVED_FILE_DIR)
        - $(SRCROOT)/build/xcode/generated

  # ── TextFellow: macOS application (was TextMate) ──
  TextFellow:
    type: application
    platform: macOS
    sources:
      - path: Applications/TextMate/src
      - path: Frameworks/SW3TSyntax/src
        includes: ["*.swift"]
        group: SW3TSyntax
      - path: Frameworks/SW3TCommandPalette/src
        includes: ["*.swift"]
        group: SW3TCommandPalette
      - path: Frameworks/SW3TLSP/src
        includes: ["*.swift"]
        group: SW3TLSP
      - path: Frameworks/SW3TConfig/src
        includes: ["*.swift"]
        group: SW3TConfig
      # App resources
      - path: Applications/TextMate/resources
        buildPhase: resources
      - path: Applications/TextMate/icons
        includes: ["*.icns"]
        buildPhase: resources
      - path: build/xcode/About
        buildPhase: resources
        type: folder
        optional: true
      # Framework resources (images, plists, nibs, icons)
      - path: Frameworks/BundleEditor/resources
        buildPhase: resources
      - path: Frameworks/BundleEditor/templates
        buildPhase: resources
      - path: Frameworks/BundleEditor/gfx
        buildPhase: resources
      - path: Frameworks/DocumentWindow/resources
        buildPhase: resources
      - path: Frameworks/FileBrowser/resources
        buildPhase: resources
      - path: Frameworks/HTMLOutput/resources
        buildPhase: resources
      - path: Frameworks/OakAppKit/resources
        buildPhase: resources
      - path: Frameworks/OakAppKit/gfx
        buildPhase: resources
      - path: Frameworks/OakTabBarView/gfx
        buildPhase: resources
      - path: Frameworks/OakTextView/resources
        buildPhase: resources
      - path: Frameworks/Preferences/resources
        buildPhase: resources
      - path: Frameworks/Preferences/icons
        buildPhase: resources
      - path: Frameworks/scm/resources
        buildPhase: resources
      - path: Frameworks/SoftwareUpdate/resources
        buildPhase: resources
      - path: Frameworks/TMFileReference/resources
        buildPhase: resources
    dependencies:
      - target: TextFellowCore
      - target: Onigmo
      - target: kvdb
      - target: TreeSitter
      - sdk: AddressBook.framework
      - sdk: AudioToolbox.framework
      - sdk: Carbon.framework
      - sdk: Cocoa.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreServices.framework
      - sdk: ExceptionHandling.framework
      - sdk: Quartz.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: UserNotifications.framework
      - sdk: WebKit.framework
    info:
      path: Applications/TextMate/Info.plist
    entitlements:
      path: Applications/TextMate/Entitlements.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.sw3t.TextFellow
      PRODUCT_NAME: TextFellow
      SWIFT_VERSION: "6.0"
      SWIFT_OBJC_BRIDGING_HEADER: Xcode/TextFellow-Bridging-Header.h
      SWIFT_OBJC_INTEROP_MODE: objcxx
      SWIFT_INCLUDE_PATHS:
        - $(SRCROOT)/Frameworks/SW3TSyntax/src
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/Shared/include
        - $(SRCROOT)/vendor/tree-sitter/lib/include
      OTHER_LDFLAGS:
        - $(inherited)
        - -liconv
        - -lsqlite3
        - -lz
    postCompileScripts:
      - name: Copy SharedSupport
        script: |
          SHARED="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/SharedSupport"
          mkdir -p "${SHARED}"
          cp -R "${SRCROOT}/Applications/TextMate/support/Bundles" "${SHARED}/"
        basedOnDependencyAnalysis: false

  # ── fellow: CLI tool (was 'mate') ──
  fellow:
    type: tool
    platform: macOS
    sources:
      - path: Applications/mate/src
    dependencies:
      - target: TextFellowCore
    settings:
      PRODUCT_NAME: fellow
      HEADER_SEARCH_PATHS:
        - $(inherited)

        - $(SRCROOT)/Shared/include
      OTHER_LDFLAGS:
        - $(inherited)
        - -liconv

        - -lz

  # ── sw3t-query: CLI tool (was 'tm_query') ──
  sw3t-query:
    type: tool
    platform: macOS
    sources:
      - path: Applications/tm_query/src
    dependencies:
      - target: TextFellowCore
    settings:
      PRODUCT_NAME: sw3t-query
      HEADER_SEARCH_PATHS:
        - $(inherited)

        - $(SRCROOT)/Shared/include
      OTHER_LDFLAGS:
        - $(inherited)
        - -liconv


  # ── PrivilegedTool: helper for file operations ──
  PrivilegedTool:
    type: tool
    platform: macOS
    sources:
      - path: Applications/PrivilegedTool/src
    dependencies:
      - target: TextFellowCore
    settings:
      PRODUCT_NAME: PrivilegedTool
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/Shared/include
      OTHER_LDFLAGS:
        - $(inherited)
        - -liconv

  # ── TextFellowTests: Swift Testing ──
  TextFellowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TextFellowTests
    dependencies:
      - target: TextFellow
    settings:
      SWIFT_VERSION: "6.0"
      SWIFT_OBJC_INTEROP_MODE: objcxx
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/vendor/tree-sitter/lib/include
      PRODUCT_BUNDLE_IDENTIFIER: org.sw3t.TextFellowTests
      GENERATE_INFOPLIST_FILE: YES
